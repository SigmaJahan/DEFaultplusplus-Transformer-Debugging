# Local GPU Smoke Test Matrix
# Minimal config: 1 model, 1 task, 1 seed, 1 epoch
# Used by: scripts/run_local_smoke.sh
# Purpose: Verify end-to-end pipeline (probes, metrics, storage) on local GPU

global:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  optimizer: AdamW
  weight_decay: 0.01
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  lr_scheduler_type: linear
  warmup_ratio: 0.06
  fp16: true
  use_dataset_cache: true
  seed_list: [42]

  representation_epochs: [1]
  representation_tokens: 128
  gradient_window: 10
  activation_interval: 5
  position_cutoff: 64

models:
  distilgpt2:
    model_id: distilgpt2
    learning_rate: 5e-5
    max_position_embeddings: 1024
    model_type: gpt2
    num_layers: 6
    num_params: 82M

tasks:
  wikitext-2:
    dataset: wikitext
    subset: wikitext-2-v1
    train_split: train
    eval_split: validation
    task_type: lm_wikitext
    metric: perplexity
    secondary_metric: loss
    max_length: 64
    num_labels: 0
