# FrankenFormer-Decoder Structural Probe Matrix
# Full experiment grid: 3 models x 2 tasks x 2 seeds = 12 model-task combos
# Each combo runs all fault configs from pipeline_configs_probes.json
#
# Severity priority: HIGH first, then MEDIUM, then LOW
# See silent_faults_severity.json for fault-specific severity parameters
#
# Feature construction follows DEFault++ (Sec 4.2):
#   C_int=12 per-layer metrics -> A_l=5 layer aggregation
#   C_opt=21 optimization metrics (step-level)
#   C_train=11 decoder training metrics (step-level)
#   C_eval=2 evaluation metrics (epoch-level)
#   A_e=3 epoch aggregation (mean, var, burst=p95)
#   A_p=5 phase aggregation (early/mid/late mean, slope, final)
#   Total: 5*(3*(5*12+21+11)+2) = 1390 features per config

global:
  epochs: 5
  batch_size: 8
  gradient_accumulation_steps: 2
  optimizer: AdamW
  weight_decay: 0.01
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  lr_scheduler_type: linear
  warmup_ratio: 0.06
  fp16: true
  use_dataset_cache: true
  seed_list: [42, 123]

  # Feature extraction settings
  representation_epochs: [1, 4, 7, 10]
  representation_tokens: 256
  gradient_window: 20
  activation_interval: 10
  position_cutoff: 64

models:
  distilgpt2:
    model_id: distilgpt2
    learning_rate: 5e-5
    max_position_embeddings: 1024
    model_type: gpt2
    num_layers: 6
    num_params: 82M
    description: "Smallest decoder, fastest iteration, baseline probe target"

  gpt2:
    model_id: gpt2
    learning_rate: 5e-5
    max_position_embeddings: 1024
    model_type: gpt2
    num_layers: 12
    num_params: 124M
    description: "Standard GPT-2, primary decoder benchmark"

  gpt-neo-125m:
    model_id: EleutherAI/gpt-neo-125M
    learning_rate: 3e-5
    max_position_embeddings: 2048
    model_type: gpt_neo
    num_layers: 12
    num_params: 125M
    description: "GPT-Neo architecture, tests generalization across decoder families"

tasks:
  wikitext-2:
    dataset: wikitext
    subset: wikitext-2-v1
    train_split: train
    eval_split: validation
    task_type: lm_wikitext
    metric: perplexity
    secondary_metric: loss
    max_length: 512
    num_labels: 0
    description: "Standard LM benchmark, ~36K train examples"

  lambada:
    dataset: lambada
    subset: plain_text
    train_split: train
    eval_split: validation
    task_type: lm_lambada
    metric: perplexity
    max_length: 256
    num_labels: 0
    description: "Long-range context prediction benchmark"
