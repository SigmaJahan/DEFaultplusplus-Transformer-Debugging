pipeline:
  name: "FrankenFormer-Encoder-Probes-Smoke"
  version: "1.0"
  description: "Minimal local test configuration"

models:
  - name: "distilbert-base-uncased"
    num_layers: 6
    hidden_size: 768
    num_attention_heads: 12
    learning_rate: 2e-5
    max_length: 64

tasks:
  sst2:
    dataset: "glue"
    subset: "sst2"
    task_type: "cls_sst2"
    metric: "accuracy"
    num_labels: 2
    train_split: "train"
    eval_split: "validation"

seeds: [42]

training:
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  logging_steps: 10

probes:
  invariance_probe_batches: 1
  invariance_pad_tokens: 2
  enable_positional_performance: true
  representation_epochs: [1]
  representation_tokens: 64
  activation_interval: 5
  gradient_window: 10

storage:
  results_dir: "results/local_smoke"
  cache_dir: "hf-cache"
  hdf5_locking: false
