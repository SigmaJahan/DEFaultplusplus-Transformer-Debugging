pipeline:
  name: "FrankenFormer-Encoder-Probes"
  version: "1.0"
  description: "Encoder fault injection with DEFault++ structural probes"

  feature_vector:
    dimensions: 1390
    formula: "A_p * (A_e * (A_l * C_int + C_opt + C_train) + C_eval)"

models:
  - name: "distilbert-base-uncased"
    num_layers: 6
    hidden_size: 768
    num_attention_heads: 12
    learning_rate: 2e-5
    max_length: 128

  - name: "bert-base-uncased"
    num_layers: 12
    hidden_size: 768
    num_attention_heads: 12
    learning_rate: 2e-5
    max_length: 128

  - name: "roberta-base"
    num_layers: 12
    hidden_size: 768
    num_attention_heads: 12
    learning_rate: 1e-5
    max_length: 128

tasks:
  sst2:
    dataset: "glue"
    subset: "sst2"
    task_type: "cls_sst2"
    metric: "accuracy"
    num_labels: 2
    train_split: "train"
    eval_split: "validation"

  mnli:
    dataset: "glue"
    subset: "mnli"
    task_type: "cls_mnli"
    metric: "accuracy"
    num_labels: 3
    train_split: "train"
    eval_split: "validation_matched"

seeds: [42, 123]

training:
  epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 2
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  logging_steps: 50

probes:
  invariance_probe_batches: 4
  invariance_pad_tokens: 2
  enable_positional_performance: true
  representation_epochs: [1, 4, 7, 10]
  representation_tokens: 256
  activation_interval: 10
  gradient_window: 20

storage:
  results_dir: "results"
  cache_dir: "hf-cache"
  hdf5_locking: true
  hdf5_lock_timeout: 300
